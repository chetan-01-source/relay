name: relay

services:
  postgres:
    image: pgvector/pgvector:pg16
    profiles: [core, dev]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: relay
      RELAY_APP_PASSWORD: ${RELAY_APP_PASSWORD:?set RELAY_APP_PASSWORD in .env}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=200
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d relay"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8
    profiles: [core, dev]
    ports:
      - "6379:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  logto:
    image: svhd/logto:latest
    profiles: [core, dev]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/logto
      TRUST_PROXY_HEADER: "1"
      ENDPOINT: http://localhost:3001
      ADMIN_ENDPOINT: http://localhost:3002
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    ports:
      - "3001:3001"
      - "3002:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  minio:
    image: minio/minio:latest
    profiles: [core, dev]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6

  mockllm:
    profiles: [dev]
    build:
      context: ../../packages/mockllm
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MOCKLLM_LATENCY_MS: "40"
    depends_on:
      - valkey

volumes:
  pgdata: {}
  minio: {}
