version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch'] # one grouped PR, not dozens
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: '/deploy/compose'
    schedule:
      interval: weekly
