name: ci

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # commitlint needs history
      - uses: pnpm/action-setup@v4 # reads packageManager from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm turbo lint typecheck
      - run: pnpm exec prettier --check .
      - run: pnpm run dep-check
      - name: commitlint (feature -> dev PRs only)
        # Only lint incoming commits on feature->dev PRs. dev->main promotions
        # re-use already-vetted commits (and the squash title is what lands),
        # so linting that range would fail on historical auto-generated titles.
        if: github.event_name == 'pull_request' && github.base_ref == 'dev'
        run: >
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}

  rls-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/check-rls.sh

  build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm turbo build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist
          retention-days: 1
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest
    needs: [build]
    # Real Postgres so integration tests (repository vs DB) actually run in CI, not just skip.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: relay
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres -d relay"
          --health-interval 5s --health-timeout 3s --health-retries 15
    env:
      # migrate as superuser; integration tests read the global catalog (no RLS role needed in CI)
      RELAY_MIGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/relay
      RELAY_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/relay
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # build first so @relay/shared/dist exists (the CLI imports it) and migrate runs from dist
      - run: pnpm turbo build --filter=@relay/server
      - name: apply migrations (schema + seed)
        run: node packages/server/dist/index.js migrate
      - run: pnpm turbo test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs
          path: '**/vitest-*.log'
          retention-days: 3
          if-no-files-found: ignore
