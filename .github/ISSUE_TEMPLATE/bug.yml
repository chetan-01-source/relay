name: Bug report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Actual vs expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact any secrets first.
      render: shell
