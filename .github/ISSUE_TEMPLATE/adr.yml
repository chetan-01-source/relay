name: Architecture Decision Record
description: Propose or record a design decision
labels: ['adr']
body:
  - type: input
    id: number
    attributes:
      label: ADR number
      placeholder: '0001'
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: The forces at play; why a decision is needed
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: Trade-offs, what becomes harder/easier
  - type: dropdown
    id: status
    attributes:
      label: Status
      options: ['proposed', 'accepted', 'superseded']
    validations:
      required: true
